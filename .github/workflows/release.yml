name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            artifact: luajit-linux-x86-64-gnu
            outfile: lpm-linux-x86-64
          - os: ubuntu-22.04-arm
            platform: linux
            artifact: luajit-linux-aarch64-gnu
            outfile: lpm-linux-aarch64
          - os: windows-latest
            platform: windows
            artifact: luajit-windows-x86-64-gnu
            outfile: lpm-windows-x86-64
          - os: macos-15-intel
            platform: macos
            artifact: luajit-macos-x86-64
            outfile: lpm-macos-x86-64
          - os: macos-15
            platform: macos
            artifact: luajit-macos-aarch64
            outfile: lpm-macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache LuaJIT
        id: cache-luajit
        uses: actions/cache@v5
        with:
          path: ${{ matrix.artifact }}
          key: ${{ matrix.artifact }}-latest

      - name: Download LuaJIT
        if: steps.cache-luajit.outputs.cache-hit != 'true'
        run: |
          curl -L -o luajit.tar.gz https://github.com/codebycruz/lj-dist/releases/download/latest/${{ matrix.artifact }}.tar.gz
          tar -xzf luajit.tar.gz
          chmod +x ${{ matrix.artifact }}/luajit${{ matrix.platform == 'windows' && '.exe' || '' }}

      - name: Build lpm (Unix)
        if: matrix.platform != 'windows'
        run: |
          cd packages/lpm
          BOOTSTRAP=1 $GITHUB_WORKSPACE/${{ matrix.artifact }}/luajit ./src/init.lua compile --outfile ${{ matrix.outfile }}

      - name: Build lpm (Windows)
        if: matrix.platform == 'windows'
        run: |
          cd packages/lpm
          $env:BOOTSTRAP=1; & "$env:GITHUB_WORKSPACE/${{ matrix.artifact }}/luajit.exe" ./src/init.lua compile --outfile ${{ matrix.outfile }}.exe

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: packages/lpm/${{ matrix.outfile }}${{ matrix.platform == 'windows' && '.exe' || '' }}
