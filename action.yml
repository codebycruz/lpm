name: "Setup lpm"
description: "Install lpm package manager"

inputs:
  version:
    description: "Version to install (e.g., '0.7.1', 'latest', or 'nightly')"
    required: false
    default: "latest"

runs:
  using: "composite"
  steps:
    - name: Install lpm (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        OS="$(uname -s)"
        ARCH="$(uname -m)"

        case "$OS-$ARCH" in
          Linux-x86_64)   ARTIFACT="lpm-linux-x86-64" ;;
          Linux-aarch64)  ARTIFACT="lpm-linux-aarch64" ;;
          Darwin-arm64)   ARTIFACT="lpm-macos-aarch64" ;;
          Darwin-x86_64)  echo "Intel macOS is currently unsupported."; exit 1 ;;
          *) echo "Unsupported platform: $OS $ARCH"; exit 1 ;;
        esac

        if [ "${{ inputs.version }}" = "nightly" ]; then
          TAG="nightly"
        elif [ "${{ inputs.version }}" = "latest" ]; then
          TAG=$(curl -sf "https://api.github.com/repos/codebycruz/lpm/releases/latest" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
        else
          TAG="v${{ inputs.version }}"
        fi

        mkdir -p "$HOME/.lpm"
        curl -fL "https://github.com/codebycruz/lpm/releases/download/$TAG/$ARTIFACT" -o "$HOME/.lpm/lpm"
        chmod +x "$HOME/.lpm/lpm"
        echo "$HOME/.lpm" >> "$GITHUB_PATH"
        "$HOME/.lpm/lpm" --setup

    - name: Install lpm (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $ARTIFACT = "lpm-windows-x86-64.exe"

        if ("${{ inputs.version }}" -eq "nightly") {
          $TAG = "nightly"
        } elseif ("${{ inputs.version }}" -eq "latest") {
          $TAG = (Invoke-RestMethod "https://api.github.com/repos/codebycruz/lpm/releases/latest").tag_name
        } else {
          $TAG = "v${{ inputs.version }}"
        }

        $lpmDir = "$env:USERPROFILE\.lpm"
        New-Item -ItemType Directory $lpmDir -Force | Out-Null
        Invoke-WebRequest "https://github.com/codebycruz/lpm/releases/download/$TAG/$ARTIFACT" -OutFile "$lpmDir\lpm.exe"
        echo "$lpmDir" >> $env:GITHUB_PATH
        & "$lpmDir\lpm.exe" --setup
